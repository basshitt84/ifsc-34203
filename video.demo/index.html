<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Video Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
</head>




<body>

<div class="video-container">
<video id="myVideo">
  <source src="assets/media/hudson-shelter-falls.mp4" type="video/mp4">
  <source src="assets/media/hudson-shelter-falls.webm" type="video/webm">
  <source src="assets/media/hudson-shelter-falls.ogv" type="video/ogg">

</video>




  <div class="controls">
    <button id="playPause" aria-label="Play">▶️</button>
    <input type="range" id="seek" value="0" step="0.01" aria-label="Seek bar">
    <span id="currentTime">0:00</span> / <span id="duration">0:00</span>

    <button id="muteToggle" aria-label="Mute">🔊</button>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1" aria-label="Volume slider">

    <button id="fullscreenToggle" aria-label="Toggle fullscreen">⛶</button>
  </div>
</div>
<h1 class="video-title">Hudson Shelter Falls</h1>
<h2>Feburary 4, 2012</h2>

<script src="assets/js/script.js"></script>
</body>
</html>
