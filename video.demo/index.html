
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HTML5 Video</title>
  <link rel="stylesheet" href="assets/css/style.css">
   <link rel="stylesheet" href="assets/js/script.js">

</head>
<body>
<div class="video-container">
  <video id="myVideo" src="assets/media/hudson-shelter-falls.mp4"></video>
    <video id="myVideo" src="assets/media/hudson-shelter-falls.webm"></video>
     <video id="myVideo" src="assets/media/hudson-shelter-falls.ogv"></video>

  <div class="controls">
    <button id="playPause" aria-label="Play">▶️</button>
    <input type="range" id="seek" value="0" step="0.01" aria-label="Seek bar">
    <span id="currentTime">0:00</span> / <span id="duration">0:00</span>

    <button id="muteToggle" aria-label="Mute">🔊</button>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1" aria-label="Volume slider">

    <button id="fullscreenToggle" aria-label="Toggle fullscreen">⛶</button>
  </div>


  
<script src="http://ajax.googleapis.com/ajax/libs/jquery/1.4.2/jquery.min.js"></script>
<script src="http://cdnjs.cloudflare.com/ajax/libs/modernizr/2.0.6/modernizr.min.js"></script>
</body>
</html>
